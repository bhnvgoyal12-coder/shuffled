<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2e7d32"/>

  <!-- Subtle pattern - card suit watermarks -->
  <g opacity="0.08" fill="white" font-family="serif" font-size="60">
    <text x="80" y="80">♠</text>
    <text x="200" y="160">♥</text>
    <text x="350" y="90">♦</text>
    <text x="500" y="170">♣</text>
    <text x="650" y="80">♠</text>
    <text x="800" y="150">♥</text>
    <text x="950" y="100">♦</text>
    <text x="1100" y="170">♣</text>
    <text x="120" y="550">♣</text>
    <text x="300" y="580">♠</text>
    <text x="480" y="540">♥</text>
    <text x="700" y="570">♦</text>
    <text x="880" y="550">♣</text>
    <text x="1050" y="580">♠</text>
  </g>

  <!-- Spade icon -->
  <text x="600" y="300" text-anchor="middle" font-size="200" fill="white" font-family="serif" opacity="0.95">♠</text>

  <!-- App name -->
  <text x="600" y="420" text-anchor="middle" font-size="90" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" letter-spacing="4">Shuffled</text>

  <!-- Tagline -->
  <text x="600" y="490" text-anchor="middle" font-size="32" fill="rgba(255,255,255,0.8)" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" letter-spacing="3">Solitaire · FreeCell · Spider · Mahjong</text>

  <!-- Bottom accent line -->
  <rect x="450" y="530" width="300" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
